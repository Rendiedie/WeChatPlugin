name: Build
on: push

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Theos
        run: bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
      - name: Build
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Release
          path: packages/*.deb
