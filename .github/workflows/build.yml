name: Build
on: push

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          brew install make dpkg ldid

      - name: Build
        run: |
          gmake package FINALPACKAGE=1

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Release
          path: packages/*.deb
