name: Build
on: push

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: |
          brew install ldid
          git clone -q https://github.com/theos/theos ~/theos
          export THEOS=~/theos
          make package FINALPACKAGE=1
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: Release
          path: packages/*.deb
